<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<title>音声書き起こし</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.34.0/dist/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f5f5f4;--bg3:#eeede9;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9e9e9a;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --accent:#185fa5;--accent-bg:#e6f1fb;--accent-text:#185fa5;
  --danger:#a32d2d;--danger-bg:#fcebeb;--danger-border:rgba(163,45,45,0.25);
  --warn-bg:#faeeda;--warn-text:#854f0b;
  --r:10px;--rl:14px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
    --text:#f0ede8;--text2:#a0a09a;--text3:#686864;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
    --accent:#4a90d9;--accent-bg:#0c2a44;--accent-text:#7ab8f5;
    --danger:#e57373;--danger-bg:#2d1515;--danger-border:rgba(229,115,115,0.3);
    --warn-bg:#2d1f08;--warn-text:#f0a832;
  }
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;-webkit-tap-highlight-color:transparent}
body{display:flex;flex-direction:column;min-height:100dvh;overflow:hidden}

/* ── screens ── */
.screen{display:none;flex-direction:column;height:100dvh;overflow:hidden}
.screen.active{display:flex}

/* ── shared header ── */
.topbar{display:flex;align-items:center;gap:10px;padding:12px 16px 10px;flex-shrink:0;border-bottom:0.5px solid var(--border)}
.topbar-icon{width:34px;height:34px;background:var(--accent-bg);border-radius:var(--r);display:flex;align-items:center;justify-content:center;color:var(--accent-text);font-size:18px;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:500}
.topbar-sub{font-size:11px;color:var(--text2);margin-top:1px}
.topbar-btn{margin-left:auto;background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:4px;display:flex;align-items:center}
.topbar-btn:active{color:var(--text)}

/* ── LIST SCREEN ── */
#listScreen .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px}
.fab{position:fixed;bottom:calc(env(safe-area-inset-bottom,16px)+16px);right:16px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.18)}
.fab:active{transform:scale(0.95)}

.session-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:background 0.12s}
.session-card:active{background:var(--bg2)}
.session-card-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px}
.session-card-icon{width:32px;height:32px;border-radius:var(--r);background:var(--accent-bg);color:var(--accent-text);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;margin-top:1px}
.session-card-meta{flex:1;min-width:0}
.session-card-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.session-card-date{font-size:11px;color:var(--text3);margin-top:2px}
.session-card-del{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:4px;flex-shrink:0}
.session-card-del:active{color:var(--danger)}
.session-card-preview{font-size:13px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.session-card-count{font-size:11px;color:var(--text3);margin-top:6px}

.empty-list{display:flex;flex-direction:column;align-items:center;justify-content:center;height:240px;color:var(--text3);gap:10px}
.empty-list i{font-size:40px}
.empty-list p{font-size:13px;text-align:center}

/* ── RECORD SCREEN ── */
#recScreen .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 16px}
.error-banner{display:none;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--r);background:var(--danger-bg);border:0.5px solid var(--danger-border);color:var(--danger);font-size:13px;margin-bottom:10px}
.error-banner.visible{display:flex}

.record-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:15px;border-radius:var(--rl);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);font-family:inherit;font-size:16px;font-weight:500;cursor:pointer;margin-bottom:10px;-webkit-appearance:none}
.record-btn:active{background:var(--bg2)}
.record-btn.recording{background:var(--danger-bg);border-color:var(--danger-border);color:var(--danger)}
.dot{width:10px;height:10px;border-radius:50%;background:currentColor;flex-shrink:0}
.recording .dot{animation:blink 1s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

.status-bar{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:var(--r);background:var(--bg2);border:0.5px solid var(--border);font-size:12px;color:var(--text2);margin-bottom:10px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
.status-bar.active .status-dot{background:#22c55e;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 2px rgba(34,197,94,.2)}50%{box-shadow:0 0 0 5px rgba(34,197,94,.1)}}

.viz-wrap{height:44px;border-radius:var(--r);border:0.5px solid var(--border);background:var(--bg2);overflow:hidden;margin-bottom:10px}
#visualizer{width:100%;height:100%;display:block}

.transcript-area{border-radius:var(--rl);border:0.5px solid var(--border);background:var(--bg);padding:14px 16px;margin-bottom:10px;min-height:160px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:130px;color:var(--text3);gap:8px}
.empty-state i{font-size:32px}
.empty-state p{font-size:12px;text-align:center}
.segment{margin-bottom:12px;padding-bottom:12px;border-bottom:0.5px solid var(--border)}
.segment:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.segment-time{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:3px}
.segment-text{font-size:15px;line-height:1.7;color:var(--text)}
.segment-text.interim{color:var(--text2);font-style:italic}
.interim-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:99px;background:var(--warn-bg);color:var(--warn-text);margin-left:6px;vertical-align:middle}

.title-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.title-input{flex:1;padding:9px 12px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);font-family:inherit;font-size:14px;-webkit-appearance:none}
.title-input:focus{outline:none;border-color:var(--accent)}

.action-row{display:flex;gap:8px;padding-bottom:calc(env(safe-area-inset-bottom,16px)+8px)}
.btn-action{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:11px;border-radius:var(--r);border:0.5px solid var(--border);background:var(--bg);color:var(--text2);font-family:inherit;font-size:13px;cursor:pointer;-webkit-appearance:none}
.btn-action:active{background:var(--bg2)}

/* ── DETAIL SCREEN ── */
#detailScreen .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 16px}
.detail-meta{font-size:12px;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.detail-segment{margin-bottom:14px;padding-bottom:14px;border-bottom:0.5px solid var(--border)}
.detail-segment:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.detail-time{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:3px}
.detail-text{font-size:15px;line-height:1.7;color:var(--text)}
.detail-action-row{display:flex;gap:8px;padding:10px 16px calc(env(safe-area-inset-bottom,16px)+10px);border-top:0.5px solid var(--border);flex-shrink:0}

/* ── toast ── */
.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,16px)+80px);left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:8px 18px;border-radius:99px;font-size:13px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity 0.2s;z-index:999}
.toast.show{opacity:1}

/* ── lang select ── */
.lang-select{padding:5px 8px;border-radius:var(--r);border:0.5px solid var(--border);background:var(--bg);color:var(--text);font-family:inherit;font-size:12px;cursor:pointer;margin-left:auto}
</style>
</head>
<body>

<!-- LIST SCREEN -->
<div class="screen active" id="listScreen">
  <div class="topbar">
    <div class="topbar-icon"><i class="ti ti-microphone" aria-hidden="true"></i></div>
    <div>
      <div class="topbar-title">音声書き起こし</div>
      <div class="topbar-sub">保存済みの録音</div>
    </div>
  </div>
  <div class="scroll" id="listScroll">
    <div class="empty-list" id="emptyList">
      <i class="ti ti-folder-open" aria-hidden="true"></i>
      <p>保存された録音はありません<br>＋ボタンで新しく録音を開始</p>
    </div>
    <div id="sessionList"></div>
  </div>
  <button class="fab" id="newBtn" aria-label="新しい録音">
    <i class="ti ti-plus" aria-hidden="true"></i>
  </button>
</div>

<!-- RECORD SCREEN -->
<div class="screen" id="recScreen">
  <div class="topbar">
    <button class="topbar-btn" id="backFromRec" aria-label="戻る">
      <i class="ti ti-arrow-left" aria-hidden="true"></i>
    </button>
    <div>
      <div class="topbar-title">新しい録音</div>
      <div class="topbar-sub" id="recSubtitle">録音前</div>
    </div>
    <select class="lang-select" id="langSelect">
      <option value="ja-JP">🇯🇵 日本語</option>
      <option value="en-US">🇺🇸 English</option>
      <option value="zh-CN">🇨🇳 中文</option>
      <option value="ko-KR">🇰🇷 한국어</option>
    </select>
  </div>
  <div class="scroll">
    <div style="height:10px"></div>
    <div class="error-banner" id="errorBanner">
      <i class="ti ti-alert-circle" aria-hidden="true"></i>
      <span id="errorMsg"></span>
    </div>
    <div class="title-row">
      <input class="title-input" id="titleInput" type="text" placeholder="タイトル（任意）" maxlength="60">
    </div>
    <button class="record-btn" id="recordBtn">
      <span class="dot"></span>
      <span id="recordLabel">録音開始</span>
    </button>
    <div class="status-bar" id="statusBar">
      <div class="status-dot"></div>
      <span id="statusText">録音ボタンを押して開始</span>
    </div>
    <div class="viz-wrap">
      <canvas id="visualizer"></canvas>
    </div>
    <div class="transcript-area">
      <div class="empty-state" id="emptyState">
        <i class="ti ti-microphone-off" aria-hidden="true"></i>
        <p>録音を開始すると<br>ここに文字が表示されます</p>
      </div>
      <div id="segments"></div>
    </div>
  </div>
  <div class="action-row">
    <button class="btn-action" id="saveBtn"><i class="ti ti-device-floppy" aria-hidden="true"></i> 保存</button>
    <button class="btn-action" id="copyBtn"><i class="ti ti-copy" aria-hidden="true"></i> コピー</button>
    <button class="btn-action" id="shareBtn"><i class="ti ti-share" aria-hidden="true"></i> 共有</button>
    <button class="btn-action" id="clearBtn"><i class="ti ti-trash" aria-hidden="true"></i> クリア</button>
  </div>
</div>

<!-- DETAIL SCREEN -->
<div class="screen" id="detailScreen">
  <div class="topbar">
    <button class="topbar-btn" id="backFromDetail" aria-label="戻る">
      <i class="ti ti-arrow-left" aria-hidden="true"></i>
    </button>
    <div style="flex:1;min-width:0">
      <div class="topbar-title" id="detailTitle" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">詳細</div>
      <div class="topbar-sub" id="detailDate"></div>
    </div>
    <button class="topbar-btn" id="detailDelBtn" aria-label="削除" style="color:var(--danger)">
      <i class="ti ti-trash" aria-hidden="true"></i>
    </button>
  </div>
  <div class="scroll" id="detailScroll">
    <div class="detail-meta" id="detailMeta"></div>
    <div id="detailSegments"></div>
  </div>
  <div class="detail-action-row">
    <button class="btn-action" id="detailCopy"><i class="ti ti-copy" aria-hidden="true"></i> コピー</button>
    <button class="btn-action" id="detailShare"><i class="ti ti-share" aria-hidden="true"></i> 共有</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'voice_sessions_v1';

function loadSessions(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); }catch(e){ return []; }
}
function saveSessions(arr){ localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

function formatDate(ts){
  return new Date(ts).toLocaleString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ─── LIST ─── */
function renderList(){
  const sessions=loadSessions();
  const list=document.getElementById('sessionList');
  const empty=document.getElementById('emptyList');
  if(!sessions.length){ empty.style.display=''; list.innerHTML=''; return; }
  empty.style.display='none';
  list.innerHTML=sessions.slice().reverse().map(s=>`
    <div class="session-card" data-id="${s.id}" role="button" tabindex="0">
      <div class="session-card-head">
        <div class="session-card-icon"><i class="ti ti-file-text" aria-hidden="true"></i></div>
        <div class="session-card-meta">
          <div class="session-card-title">${escHtml(s.title||'無題の録音')}</div>
          <div class="session-card-date">${formatDate(s.createdAt)}</div>
        </div>
        <button class="session-card-del" data-del="${s.id}" aria-label="削除">
          <i class="ti ti-x" aria-hidden="true"></i>
        </button>
      </div>
      <div class="session-card-preview">${escHtml((s.segments||[]).map(x=>x.text).join(' ').slice(0,120))}</div>
      <div class="session-card-count">${(s.segments||[]).length} 件の発言</div>
    </div>
  `).join('');

  list.querySelectorAll('.session-card').forEach(card=>{
    card.addEventListener('click', e=>{
      if(e.target.closest('[data-del]')) return;
      openDetail(card.dataset.id);
    });
  });
  list.querySelectorAll('[data-del]').forEach(btn=>{
    btn.addEventListener('click', e=>{
      e.stopPropagation();
      deleteSession(btn.dataset.del);
    });
  });
}

function deleteSession(id){
  const sessions=loadSessions().filter(s=>s.id!==id);
  saveSessions(sessions);
  renderList();
  showToast('削除しました');
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('newBtn').addEventListener('click',()=>{
  resetRec();
  showScreen('recScreen');
});

/* ─── DETAIL ─── */
let currentDetailId=null;
function openDetail(id){
  const s=loadSessions().find(x=>x.id===id);
  if(!s) return;
  currentDetailId=id;
  document.getElementById('detailTitle').textContent=s.title||'無題の録音';
  document.getElementById('detailDate').textContent=formatDate(s.createdAt);
  document.getElementById('detailMeta').innerHTML=
    `<i class="ti ti-clock" aria-hidden="true" style="font-size:14px"></i> ${formatDate(s.createdAt)} &nbsp;·&nbsp; ${(s.segments||[]).length} 件`;
  document.getElementById('detailSegments').innerHTML=
    (s.segments||[]).map(seg=>`
      <div class="detail-segment">
        <div class="detail-time">${seg.time}</div>
        <div class="detail-text">${escHtml(seg.text)}</div>
      </div>
    `).join('');
  showScreen('detailScreen');
}

document.getElementById('backFromDetail').addEventListener('click',()=>{ showScreen('listScreen'); renderList(); });

document.getElementById('detailDelBtn').addEventListener('click',()=>{
  if(!currentDetailId) return;
  deleteSession(currentDetailId);
  showScreen('listScreen');
  renderList();
});

function getDetailText(){
  const s=loadSessions().find(x=>x.id===currentDetailId);
  if(!s) return '';
  return (s.segments||[]).map(x=>`[${x.time}] ${x.text}`).join('\n');
}

document.getElementById('detailCopy').addEventListener('click',()=>{
  const t=getDetailText(); if(!t){showToast('テキストなし');return;}
  navigator.clipboard.writeText(t).then(()=>showToast('コピーしました！'));
});
document.getElementById('detailShare').addEventListener('click',()=>{
  const t=getDetailText(); if(!t){showToast('テキストなし');return;}
  const s=loadSessions().find(x=>x.id===currentDetailId);
  if(navigator.share) navigator.share({title:s?.title||'音声書き起こし',text:t});
  else navigator.clipboard.writeText(t).then(()=>showToast('コピーしました！'));
});

/* ─── RECORD ─── */
let recognition=null, isRecording=false;
let finalTranscripts=[], audioCtx=null, analyser=null, animFrame=null, stream=null;

function resetRec(){
  stopRecording();
  finalTranscripts=[];
  document.getElementById('titleInput').value='';
  document.getElementById('segments').innerHTML='';
  document.getElementById('emptyState').style.display='';
  setStatus('録音ボタンを押して開始','');
  hideError();
}

document.getElementById('backFromRec').addEventListener('click',()=>{
  stopRecording();
  showScreen('listScreen');
  renderList();
});

function setStatus(text,type){
  document.getElementById('statusText').textContent=text;
  document.getElementById('statusBar').className='status-bar'+(type?' '+type:'');
}
function showError(msg){ document.getElementById('errorMsg').textContent=msg; document.getElementById('errorBanner').classList.add('visible'); }
function hideError(){ document.getElementById('errorBanner').classList.remove('visible'); }

/* visualizer */
const canvas=document.getElementById('visualizer');
const ctx2d=canvas.getContext('2d');
function setupVisualizer(ms){
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  analyser=audioCtx.createAnalyser(); analyser.fftSize=256;
  audioCtx.createMediaStreamSource(ms).connect(analyser);
  drawViz();
}
function drawViz(){
  const W=canvas.parentElement.clientWidth, H=canvas.parentElement.clientHeight;
  canvas.width=W; canvas.height=H;
  const bufLen=analyser?analyser.frequencyBinCount:128;
  const data=new Uint8Array(bufLen);
  function draw(){
    animFrame=requestAnimationFrame(draw);
    if(analyser) analyser.getByteFrequencyData(data);
    ctx2d.clearRect(0,0,W,H);
    if(!isRecording){
      ctx2d.beginPath(); ctx2d.strokeStyle='rgba(128,128,128,0.3)';
      ctx2d.moveTo(0,H/2); ctx2d.lineTo(W,H/2); ctx2d.stroke(); return;
    }
    const bw=(W/bufLen)*2; let x=0;
    for(let i=0;i<bufLen;i++){
      const v=data[i]/255, bh=v*H*0.85;
      ctx2d.fillStyle=`rgba(24,95,165,${0.4+v*0.6})`;
      ctx2d.fillRect(x,(H-bh)/2,bw-1,bh); x+=bw;
    }
  }
  draw();
}
function stopViz(){
  if(animFrame) cancelAnimationFrame(animFrame);
  if(audioCtx){ audioCtx.close(); audioCtx=null; analyser=null; }
}

function renderSegments(){
  const seg=document.getElementById('segments');
  if(!finalTranscripts.length){ document.getElementById('emptyState').style.display=''; seg.innerHTML=''; return; }
  document.getElementById('emptyState').style.display='none';
  seg.innerHTML=finalTranscripts.map(s=>
    `<div class="segment"><div class="segment-time">${s.time}</div><div class="segment-text">${escHtml(s.text)}</div></div>`
  ).join('');
  seg.parentElement.scrollTop=99999;
}

function setInterim(text){
  let el=document.getElementById('interimSeg');
  if(!text){ if(el) el.remove(); return; }
  document.getElementById('emptyState').style.display='none';
  if(!el){ el=document.createElement('div'); el.id='interimSeg'; el.className='segment'; document.getElementById('segments').appendChild(el); }
  el.innerHTML=`<div class="segment-time">認識中…<span class="interim-badge">暫定</span></div><div class="segment-text interim">${escHtml(text)}</div>`;
  el.parentElement.scrollTop=99999;
}

function initRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return null;
  const r=new SR();
  r.lang=document.getElementById('langSelect').value;
  r.continuous=true; r.interimResults=true; r.maxAlternatives=1;
  return r;
}

async function startRecording(){
  hideError();
  if(!window.SpeechRecognition&&!window.webkitSpeechRecognition){
    showError('このブラウザは音声認識非対応。Chrome for Androidをご利用ください。'); return;
  }
  try{ stream=await navigator.mediaDevices.getUserMedia({audio:true}); setupVisualizer(stream); }
  catch(e){ showError('マイクへのアクセスが拒否されました。'); return; }
  recognition=initRec();
  if(!recognition){ showError('音声認識の初期化に失敗しました。'); return; }
  recognition.onstart=()=>{
    isRecording=true;
    document.getElementById('recordBtn').classList.add('recording');
    document.getElementById('recordLabel').textContent='録音停止';
    setStatus('録音中…','active');
  };
  recognition.onresult=(e)=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal){ finalTranscripts.push({text:t.trim(),time:new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}); renderSegments(); setInterim(''); }
      else interim+=t;
    }
    if(interim) setInterim(interim);
  };
  recognition.onerror=(e)=>{
    if(e.error==='no-speech'){ setStatus('音声未検出。もう一度話してください。','active'); return; }
    showError(`エラー: ${e.error}`); stopRecording();
  };
  recognition.onend=()=>{ if(isRecording) recognition.start(); };
  recognition.start();
}

function stopRecording(){
  isRecording=false;
  if(recognition){ recognition.onend=null; recognition.stop(); recognition=null; }
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  stopViz(); setInterim('');
  document.getElementById('recordBtn').classList.remove('recording');
  document.getElementById('recordLabel').textContent='録音開始';
  if(finalTranscripts.length) setStatus('録音停止。保存ボタンで保存できます。','');
  else setStatus('録音停止。ボタンを押すと再開できます。','');
}

function getPlainText(){ return finalTranscripts.map(s=>`[${s.time}] ${s.text}`).join('\n'); }

document.getElementById('recordBtn').addEventListener('click',()=>isRecording?stopRecording():startRecording());

document.getElementById('saveBtn').addEventListener('click',()=>{
  if(!finalTranscripts.length){ showToast('テキストがありません'); return; }
  const title=document.getElementById('titleInput').value.trim();
  const session={
    id: Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    title: title||'',
    createdAt: Date.now(),
    segments: [...finalTranscripts]
  };
  const sessions=loadSessions();
  sessions.push(session);
  saveSessions(sessions);
  showToast('保存しました！');
  finalTranscripts=[];
  renderSegments();
  document.getElementById('titleInput').value='';
  setStatus('録音ボタンを押して開始','');
});

document.getElementById('copyBtn').addEventListener('click',()=>{
  const t=getPlainText(); if(!t){showToast('テキストなし');return;}
  navigator.clipboard.writeText(t).then(()=>showToast('コピーしました！'));
});
document.getElementById('shareBtn').addEventListener('click',()=>{
  const t=getPlainText(); if(!t){showToast('テキストなし');return;}
  const title=document.getElementById('titleInput').value.trim()||'音声書き起こし';
  if(navigator.share) navigator.share({title,text:t});
  else navigator.clipboard.writeText(t).then(()=>showToast('コピーしました！'));
});
document.getElementById('clearBtn').addEventListener('click',()=>{
  finalTranscripts=[]; setInterim(''); renderSegments();
  if(!isRecording) setStatus('録音ボタンを押して開始','');
});
document.getElementById('langSelect').addEventListener('change',()=>{
  if(isRecording){ stopRecording(); setTimeout(startRecording,300); }
});

renderList();
drawViz();
</script>
</body>
</html>
